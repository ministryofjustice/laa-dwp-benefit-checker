spring:
  application:
    name: LAA Benefit Checker 2.0
  webservices:
    wsdl-locations: classpath:META-INF/schemas/
# used by actuator info endpoint
info:
  app:
    name: LAA Benefit Checker 2.0 application
    description: A service that provides a REST API to determine if a person is on benefits or not.
    version: 1.0.0

management:
  # specify actuator endpoints to enable
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

external-services:
  dwp:
    url: ${DWP_SOAP_URL}

service:
  name: ${CREDENTIALS_SERVICE_CONTEXT}
  client-ids: ${CREDENTIALS_CLIENT_IDS}

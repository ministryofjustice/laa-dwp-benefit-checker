name: Build and Deploy to Non-Prod Environments

permissions:
  id-token: write
  contents: read

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  application-image-build:
    name: application-image-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd #v5
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5
        with:
          distribution: 'corretto'
          java-version: '25'

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a #v4
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 #v2
        id: login-ecr

      - name: Build & Push Image
        id: build-and-push-image
        run: |
          echo "Building the ear file and Docker image with gradle..."
          chmod +x ./gradlew
          ./gradlew build
          echo "Building the docker image and tagging it"
          docker build -t laa-benefit-checker-interim .
          docker tag laa-benefit-checker-interim $REGISTRY/$REPOSITORY:$GITHUB_TAG
          echo "Pushing the Docker image to $REGISTRY/$REPOSITORY:$GITHUB_TAG"
          docker push $REGISTRY/$REPOSITORY:$GITHUB_TAG
          echo "{ecr-image}={$REGISTRY/$REPOSITORY:$GITHUB_TAG}" >> $GITHUB_OUTPUT
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          GITHUB_TAG: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test coverage verification
        run: ./gradlew jacocoTestCoverageVerification

      - name: Integration test
        run: ./gradlew integrationTest --tests '*IntegrationTest'

      - name: checkstyle test
        run: ./gradlew checkstyleTest

      - name: Publish package
        run: ./gradlew publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload checkstyle report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: checkstyle-report
          path: |
            bc-service/build/reports/checkstyle/*.html
            bc-api/build/reports/checkstyle/*.html
          retention-days: 14

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: test-report
          path: |
            bc-service/build/reports/tests
            bc-api/build/reports/tests
          retention-days: 14

      - name: Upload jacoco coverage report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: jacoco-coverage-report
          path: |
            bc-service/build/reports/jacoco/*/jacocoTestReport.xml
            bc-api/build/reports/jacoco/*/jacocoTestReport.xml
          retention-days: 14

  deploy-to-uat:
    name: deploy-to-uat
    needs: [application-image-build]
    runs-on: ubuntu-latest
    environment: uat
    env:
      KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
      KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd #v5
      - name: Authenticating to the Kubernetes cluster
        id: authenticate-k8s-cluster
        run: |
          echo "${{ secrets.KUBE_CERT }}" > ca.crt
          kubectl config set-cluster ${KUBE_CLUSTER} --certificate-authority=./ca.crt --server=https://${KUBE_CLUSTER}
          kubectl config set-credentials deploy-user --token=${{ secrets.KUBE_TOKEN }}
          kubectl config set-context ${KUBE_CLUSTER} --cluster=${KUBE_CLUSTER} --user=deploy-user --namespace=${KUBE_NAMESPACE}
          kubectl config use-context ${KUBE_CLUSTER}

      - name: Helm deploy to UAT environment
        id: deploy-to-uat
        run: |
          cd .helm/laa-benefit-checker-interim
          helm upgrade laa-benefit-checker-interim -f values/uat.yaml . --install --wait --namespace=${KUBE_NAMESPACE} --set image.tag="$GITHUB_TAG"
        env:
          GITHUB_TAG: ${{ github.sha }}

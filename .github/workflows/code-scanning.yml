name: Code scanning

on:
  pull_request:
    branches: [ 'main' ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  vulnerability-scan-app:
    name: vulnerability-scan-app
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_TEST_EXCLUDE: build,generated
      SNYK_TARGET_REFERENCE: main
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build app jar with gradle
        run: ./gradlew build

      - name: Run Snyk to check app for vulnerabilities
        uses: snyk/actions/gradle@9adf32b1121593767fc3c057af55b55db032dc04 # master
        with:
          command: code test
          args: --severity-threshold=high

  vulnerability-scan-docker:
    name: vulnerability-scan-docker
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build app jar with gradle
        run: ./gradlew build

      - name: Build a Docker image
        run: docker build -t spring-boot-microservice:scan .

      - name: Run Snyk to check Docker image for vulnerabilities
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 # master
        with:
          image: spring-boot-microservice:scan
          args: --file=Dockerfile --severity-threshold=high

name: Code scanning

on:
  pull_request:
    branches: [ 'main' ]
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  vulnerability-scan-app:
    name: vulnerability-scan-app
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_TEST_EXCLUDE: build,generated
      SNYK_TARGET_REFERENCE: main
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build app jar with gradle
        run: ./gradlew build

      - name: Run Snyk to check app for vulnerabilities
        uses: snyk/actions/gradle@9adf32b1121593767fc3c057af55b55db032dc04 # master
        with:
          command: code test
          args: --severity-threshold=high

  vulnerability-scan-docker:
    name: vulnerability-scan-docker
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5
        with:
          java-version: 25
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build app jar with gradle
        run: ./gradlew build

      - name: Build a Docker image
        run: docker build -t spring-boot-microservice:scan .

      - name: Run Snyk to check Docker image for vulnerabilities
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 # master
        with:
          image: spring-boot-microservice:scan
          args: --file=Dockerfile --severity-threshold=high

  build:
    name: application-image-build
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.build-and-push-image.outputs.image_uri }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd #v5
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5
        with:
          distribution: 'corretto'
          java-version: '25'

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a #v4
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 #v2
        id: login-ecr

      - name: Build & Push Image
        id: build-and-push-image
        run: |
          echo "Building the ear file and Docker image with gradle..."
          chmod +x ./gradlew
          ./gradlew build
          echo "Building the docker image and tagging it"
          docker build -t laa-benefit-checker-interim .
          docker tag laa-benefit-checker-interim $REGISTRY/$REPOSITORY:$GITHUB_TAG
          echo "Pushing the Docker image to $REGISTRY/$REPOSITORY:$GITHUB_TAG"
          docker push $REGISTRY/$REPOSITORY:$GITHUB_TAG
          echo "image_uri=$REGISTRY/$REPOSITORY:$GITHUB_TAG" >> $GITHUB_OUTPUT
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          GITHUB_TAG: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: sast
    needs: build
    uses: ministryofjustice/laa-reusable-github-actions/.github/workflows/sast.yml@a652d1076b05dd80d3ab619d263aac6ce526d70b
    permissions:
      actions: read
      id-token: write
      contents: read
      security-events: write
    with:
      image_uri: ${{ needs.build.outputs.ecr-image }}
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}
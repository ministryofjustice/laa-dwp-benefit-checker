apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "laa-benefit-checker-interim.fullname" . }}-monitoring
  labels:
    {{- include "laa-benefit-checker-interim.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "laa-benefit-checker-interim.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow ingress from monitoring namespace for Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              component: monitoring
      ports:
        - protocol: TCP
          port: {{ .Values.actuator.port | default 8080 }}

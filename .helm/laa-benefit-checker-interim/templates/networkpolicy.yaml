{{- if .Values.actuator.metrics.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "laa-benefit-checker-interim" .  }}-monitoring
  labels:
    {{ include "laa-benefit-checker-interim.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{ include "laa-benefit-checker-interim.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              component: monitoring
{{- end }}
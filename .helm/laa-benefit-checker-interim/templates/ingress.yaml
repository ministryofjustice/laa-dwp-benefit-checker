{{- if .Values.ingress.enabled -}}
{{- $fullName := include "laa-benefit-checker-interim.fullname" . -}}
{{- if and .Values.ingress.className (not (semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion)) }}
  {{- if not (hasKey .Values.ingress.annotations "kubernetes.io/ingress.class") }}
  {{- $_ := set .Values.ingress.annotations "kubernetes.io/ingress.class" .Values.ingress.className}}
  {{- end }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    app: {{ template "laa-benefit-checker-interim.name" . }}
    chart: {{ template "laa-benefit-checker-interim.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- include "laa-benefit-checker-interim.ingress" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    {{- range .hosts }}
    - hosts:
      - {{ .domain | quote }}
    {{- end }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ $.Values.ingress.internalHost.host | quote }}
      http:
        paths:
          - path: {{ $.Values.ingress.internalHost.path }}
            pathType: "Prefix"
            backend:
              service:
                name: {{ $fullName }}
                port:
                  name: http
{{- end }}
